apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop-final
  region: us-east-1
  version: "1.34"

vpc:
  # Auto-create a new VPC to avoid conflicts
  cidr: "10.0.0.0/16"
  vpc:
  cidr: "10.0.0.0/16"   # optional, can omit for default

managedNodeGroups:
  - name: workers
    instanceType: t3.micro
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    amiFamily: AmazonLinux2023
    volumeSize: 20
    ssh:
      allow: true       # allows SSH access
      publicKeyName: my-key  # change to your key pair

cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator", "controllerManager", "scheduler"]

addons:
  - name: vpc-cni
  - name: kube-proxy
  - name: coredns
  - name: metrics-server

# Disable Auto Mode for eksctl 0.225+
autoModeConfig:
  enabled: false